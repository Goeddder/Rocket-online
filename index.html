<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garant Shop Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-grad: radial-gradient(circle at top, #1a1a1e 0%, #050505 100%);
            --card-bg: rgba(30, 30, 35, 0.7);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text-main: #ffffff;
            --text-gray: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--bg-grad); color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0;
            min-height: 100vh; overflow: hidden;
        }

        /* КОНТЕЙНЕРИ ТАБІВ */
        .container { 
            padding: 25px 20px 140px 20px; 
            height: 100vh; overflow-y: auto; 
            display: none; 
        }
        .container.active { display: block; }
        
        h2 { font-size: 28px; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; }

        /* МАГАЗИН */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .card {
            background: var(--card-bg); border-radius: 28px; position: relative; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 0.9 / 1; cursor: pointer;
        }
        .card:active { transform: scale(0.92); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); 
            padding: 12px; font-size: 11px; font-weight: 800; text-align: center; 
        }

        /* ПРОФІЛЬ */
        .profile-card { 
            background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 32px; 
            padding: 40px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .p-avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 20px; box-shadow: 0 0 20px var(--accent-glow); }

        /* ФУЛЛ-СКРІН МЕНЮ (SHEET) */
        .sheet { 
            position: fixed; inset: 0; background: var(--bg-grad); z-index: 2000; 
            display: none; padding: 30px; overflow-y: auto;
        }
        .sheet.active { display: block; animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

        .btn-back { display: flex; align-items: center; gap: 8px; color: var(--text-gray); font-weight: 600; margin-bottom: 30px; cursor: pointer; }

        .game-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .mini-icon { width: 80px; height: 80px; border-radius: 22px; border: 2px solid var(--accent); object-fit: cover; }

        .input-group { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 22px; padding: 18px; margin-bottom: 20px; transition: 0.3s;
        }
        .input-group:focus-within { border-color: var(--accent); background: rgba(139, 92, 246, 0.05); }
        .input-group label { display: block; font-size: 10px; color: var(--text-gray); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .input-group input { width: 100%; background: none; border: none; color: white; font-size: 20px; font-weight: 700; }

        .presets { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 5px; }
        .preset-btn { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; 
            padding: 12px 20px; border-radius: 15px; font-weight: 700; white-space: nowrap;
        }
        .preset-btn:active { background: var(--accent); }

        .total-price { 
            text-align: center; padding: 30px; background: var(--accent-glow); 
            border-radius: 28px; border: 2px dashed var(--accent); margin-bottom: 30px;
        }
        .btn-pay { 
            background: var(--accent); color: white; border: none; border-radius: 24px; 
            padding: 24px; width: 100%; font-size: 20px; font-weight: 900; 
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        /* НАВІГАЦІЯ */
        .nav-bar { 
            position: fixed; bottom: 25px; left: 20px; right: 20px; 
            background: rgba(25, 25, 30, 0.85); backdrop-filter: blur(25px); 
            display: flex; justify-content: space-around; padding: 18px; 
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); z-index: 1000; 
        }
        .nav-item { background: none; border: none; color: var(--text-gray); display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="tab-home" class="container active animate__animated animate__fadeIn">
        <h2>Магазин</h2>
        <div class="grid">
            <div class="card animate__animated animate__backInUp" onclick="openGame('Roblox', 0.45, 'https://ru.files.fm/u/x9zwd7b67d?ak=c65d6')">
                <img src="https://ru.files.fm/u/x9zwd7b67d?ak=c65d6" onerror="this.src='https://img.icons8.com/color/512/roblox.png'">
                <div class="card-info">ROBLOX • 0.45₴</div>
            </div>
        </div>
    </div>

    <div id="tab-history" class="container animate__animated animate__fadeIn">
        <h2>Замовлення</h2>
        <div id="history-list"></div>
    </div>

    <div id="tab-profile" class="container animate__animated animate__fadeIn">
        <h2>Профіль</h2>
        <div class="profile-card">
            <img id="u-photo" class="p-avatar" src="https://via.placeholder.com/110">
            <h3 id="u-name" style="font-size: 24px;">Завантаження...</h3>
            <p id="u-id" style="color:var(--text-gray); font-weight: 600;">ID: 00000000</p>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="layout-grid"></i><span>Магазин</span></button>
        <button class="nav-item" onclick="switchTab('history', this)"><i data-lucide="receipt"></i><span>Історія</span></button>
        <button class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i><span>Профіль</span></button>
    </nav>
</div>

<div id="pay-sheet" class="sheet">
    <div class="btn-back" onclick="closeSheet()"><i data-lucide="arrow-left"></i> ПОВЕРНУТИСЯ</div>
    
    <div class="game-header">
        <img id="g-icon" class="mini-icon" src="">
        <div>
            <h1 id="g-name" style="margin:0; font-size:32px; font-weight:900;">Game</h1>
            <div style="color:var(--green); font-weight:800;">Курс: 1 шт = <span id="g-rate">0.45</span>₴</div>
        </div>
    </div>

    <div class="input-group">
        <label>Ігровий нікнейм або ID</label>
        <input type="text" id="p-tag" placeholder="Наприклад: RobloxMaster">
    </div>

    <div class="input-group">
        <label>Введіть кількість</label>
        <input type="number" id="p-amount" value="100" oninput="recalc()">
    </div>

    <div class="presets">
        <button class="preset-btn" onclick="setAmount(500)">500 R$</button>
        <button class="preset-btn" onclick="setAmount(1000)">1000 R$</button>
        <button class="preset-btn" onclick="setAmount(2500)">2500 R$</button>
        <button class="preset-btn" onclick="setAmount(5000)">5000 R$</button>
    </div>

    <div class="total-price">
        <div style="font-size:12px; color:var(--text-gray); margin-bottom:10px; font-weight:800;">ПІДСУМОК ДО ОПЛАТИ</div>
        <span style="font-size:42px; font-weight:950;" id="total-price">45.00</span> <span style="font-size:24px; font-weight:700;">₴</span>
    </div>

    <button class="btn-pay animate__animated animate__pulse animate__infinite" onclick="sendOrder()">ОПЛАТИТИ ЗАРАЗ</button>
    <div style="height: 50px;"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand(); lucide.createIcons();

    const BOT_TOKEN = "8651326096:AAFBOQ-GPNJKON6KGic81DvxHjH-XDXwYFM";
    const ADMIN_ID = 1471307057; 

    let curRate = 0, curName = "";
    const user = tg.initDataUnsafe?.user || { id: 777, first_name: "Гість" };

    // Профіль
    document.getElementById('u-name').innerText = user.first_name;
    document.getElementById('u-id').innerText = 'ID: ' + user.id;
    if(user.photo_url) document.getElementById('u-photo').src = user.photo_url;

    function switchTab(tab, el) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(tab === 'history') renderHistory();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function openGame(name, rate, icon) {
        curName = name; curRate = rate;
        document.getElementById('g-name').innerText = name;
        document.getElementById('g-rate').innerText = rate;
        document.getElementById('g-icon').src = icon;
        document.getElementById('pay-sheet').style.display = 'block';
        document.getElementById('pay-sheet').classList.add('active');
        recalc();
    }

    function closeSheet() { 
        document.getElementById('pay-sheet').classList.remove('active');
        setTimeout(() => { document.getElementById('pay-sheet').style.display = 'none'; }, 400);
    }

    function setAmount(val) { document.getElementById('p-amount').value = val; recalc(); tg.HapticFeedback.selectionChanged(); }
    function recalc() { document.getElementById('total-price').innerText = (document.getElementById('p-amount').value * curRate).toFixed(2); }

    async function sendOrder() {
        const tag = document.getElementById('p-tag').value;
        const amt = document.getElementById('p-amount').value;
        const total = (amt * curRate).toFixed(2);
        if(!tag || amt <= 0) return tg.showAlert("Заповніть ваші дані!");

        const orderId = Math.floor(Math.random()*9000)+1000;
        const order = { id: orderId, name: curName, amt: amt, price: total, tag: tag, status: 'ОБРОБКА', userId: user.id };
        
        let history = JSON.parse(localStorage.getItem('full_shop_v1') || '[]');
        history.push(order);
        localStorage.setItem('full_shop_v1', JSON.stringify(history));

        const msg = `🆕 *ЗАМОВЛЕННЯ #${orderId}*\n\n👤 Клієнт: [${user.first_name}](tg://user?id=${user.id})\n🎮 Гра: ${curName}\n💎 К-сть: ${amt}\n🆔 Нік: \`${tag}\`\n💰 Сума: ${total}₴`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: "Markdown" })
        });

        tg.openLink(`https://send.monobank.ua/jar/7bpLBmtzoA?a=${Math.round(total)}`);
        closeSheet();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const orders = JSON.parse(localStorage.getItem('full_shop_v1') || '[]');
        if(!orders.length) { list.innerHTML = '<p style="text-align:center; color:gray; margin-top:50px;">Тут з’являться ваші чеки</p>'; return; }
        
        list.innerHTML = orders.reverse().map((o, idx) => {
            const realIdx = orders.length - 1 - idx;
            const color = o.status === 'УСПІШНО' ? 'var(--green)' : (o.status === 'ВІДХИЛЕНО' ? 'var(--red)' : 'var(--accent)');
            return `
                <div class="input-group animate__animated animate__fadeInUp" style="border-left:5px solid ${color}">
                    <div style="display:flex; justify-content:space-between;"><b>${o.name}</b> <span style="color:${color}; font-size:10px; font-weight:900;">${o.status}</span></div>
                    <div style="font-size:12px; margin-top:5px; color:var(--text-gray)">${o.amt} шт • ${o.price}₴ • ${o.tag}</div>
                    ${(user.id === ADMIN_ID && o.status === 'ОБРОБКА') ? `
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button onclick="updateStatus(${realIdx}, 'УСПІШНО')" style="flex:1; background:var(--green); border:none; color:black; padding:8px; border-radius:10px; font-weight:800; font-size:10px;">ПРИЙНЯТИ</button>
                            <button onclick="updateStatus(${realIdx}, 'ВІДХИЛЕНО')" style="flex:1; background:var(--red); border:none; color:white; padding:8px; border-radius:10px; font-weight:800; font-size:10px;">ВІДХИЛИТИ</button>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    async function updateStatus(idx, status) {
        let history = JSON.parse(localStorage.getItem('full_shop_v1') || '[]');
        const o = history[idx]; o.status = status;
        localStorage.setItem('full_shop_v1', JSON.stringify(history));
        const txt = status === 'УСПІШНО' ? `✅ Замовлення #${o.id} підтверджено! Товар вже на акаунті.` : `❌ Оплата замовлення #${o.id} не знайдена.`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chat_id: o.userId, text: txt }) });
        renderHistory();
        tg.HapticFeedback.notificationOccurred(status === 'УСПІШНО' ? 'success' : 'error');
    }
</script>
</body>
</html>

                                                                                                                    </html>
